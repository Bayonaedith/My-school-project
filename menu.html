<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Menu | ST Paul Learning Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 700px;
    margin: 40px auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  h2 {
    text-align: center;
    color: #004aad;
    padding: 20px 0;
    margin: 0;
  }

  .menu-list {
    display: flex;
    flex-direction: column;
  }

  .menu-item {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    cursor: pointer;
    transition: background 0.3s, color 0.3s;
    border-bottom: 1px solid #eee;
  }

  .menu-item:hover {
    background: #004aad;
    color: #fff;
  }

  .menu-item i {
    margin-right: 15px;
    color: #004aad;
    font-size: 18px;
    min-width: 25px;
    text-align: center;
  }

  .menu-item p {
    margin: 0;
    font-weight: 600;
    color: #004aad;
  }

  @media screen and (max-width: 600px) {
    .menu-item { padding: 12px 15px; }
    .menu-item i { margin-right: 10px; font-size: 16px; min-width: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <h2>Website Navigation Menu</h2>
  <div class="menu-list">
    <div class="menu-item" onclick="window.location.href='index.html'">
      <i class="fa-solid fa-house"></i>
      <p>Home</p>
    </div>
    <div class="menu-item" onclick="window.location.href='about.html'">
      <i class="fa-solid fa-circle-info"></i>
      <p>About</p>
    </div>
    <div class="menu-item" onclick="window.location.href='academics.html'">
      <i class="fa-solid fa-book-open"></i>
      <p>Academics</p>
    </div>
    <div class="menu-item" onclick="window.location.href='gallery.html'">
      <i class="fa-solid fa-images"></i>
      <p>Gallery</p>
    </div>
    <div class="menu-item" onclick="window.location.href='admissions.html'">
      <i class="fa-solid fa-user-graduate"></i>
      <p>Admissions</p>
    </div>
    <div class="menu-item" onclick="window.location.href='admin-dashboard.html'">
      <i class="fa-solid fa-user-lock"></i>
      <p>Admin Login</p>
    </div>
    <div class="menu-item" onclick="window.location.href='student-portal.html'">
      <i class="fa-solid fa-user"></i>
      <p>Student Login</p>
    </div>
    <div class="menu-item" onclick="window.location.href='menu.html'">
      <i class="fa-solid fa-list"></i>
      <p>Menu</p>
    </div>
  </div>
</div>

<script>
  // Highlight current page in the menu
  const menuItems = document.querySelectorAll('.menu-item');
  const currentPage = window.location.pathname.split("/").pop(); // get current file name

  menuItems.forEach(item => {
    const link = item.getAttribute('onclick').match(/'(.+?)'/)[1]; // extract link from onclick
    if(link === currentPage){
      item.style.background = '#004aad';
      item.style.color = '#fff';
      const icon = item.querySelector('i');
      const text = item.querySelector('p');
      icon.style.color = '#fff';
      text.style.color = '#fff';
    }
  });
</script>

</body>
</html>
