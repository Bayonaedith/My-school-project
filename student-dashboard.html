<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<style>
body{background:#0f172a;color:white;font-family:sans-serif}
.card{background:#1e293b;padding:30px;margin:50px auto;width:500px;border-radius:12px;box-shadow:0 0 20px #00f0ff}
</style>
</head>
<body>

<div class="card">
<h2 id="welcome"></h2>
<p id="class"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,doc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c",
  storageBucket: "my-school-project-6e00c.firebasestorage.app",
  messagingSenderId: "14283853516",
  appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
  measurementId: "G-LTJZ2RDG15"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{
  if(user){
    const snap = await getDoc(doc(db,"students",user.uid));
    if(snap.exists()){
      welcome.innerText="Welcome "+snap.data().fullName;
      class.innerText="Class: "+snap.data().class;
    }
  } else {
    window.location.href="student-login.html";
  }
});
</script>
</body>
</html>
