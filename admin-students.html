<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family:Poppins; background:#f4f6f9; margin:0; }
nav { background:#002147; color:white; padding:15px 30px; display:flex; justify-content:space-between; }
.container { padding:30px; }
input, select { padding:10px; margin:5px; }
button { padding:8px 12px; cursor:pointer; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:10px; }
th { background:#002147; color:white; }
.edit { background:#ffc107; border:none; }
.delete { background:#dc3545; color:white; border:none; }
</style>
</head>
<body>

<nav>
<h2>Student Management</h2>
<button onclick="logout()">Logout</button>
</nav>

<div class="container">

<h3>Add Student</h3>
<input type="text" id="name" placeholder="Student Name">
<input type="email" id="email" placeholder="Student Email">
<input type="text" id="class" placeholder="Class">
<input type="text" id="parentPhone" placeholder="Parent Phone">
<button onclick="addStudent()">Add Student</button>

<h3>All Students</h3>
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Class</th>
<th>Parent Phone</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const schoolId = "school_001"; // later dynamic

const table = document.getElementById("studentTable");

async function loadStudents() {
  table.innerHTML = "";
  const snapshot = await getDocs(collection(db, "students", schoolId, "list"));
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    table.innerHTML += `
      <tr>
        <td>${data.name}</td>
        <td>${data.email}</td>
        <td>${data.class}</td>
        <td>${data.parentPhone}</td>
        <td>
          <button class="edit" onclick="editStudent('${docSnap.id}','${data.name}','${data.class}')">Edit</button>
          <button class="delete" onclick="deleteStudent('${docSnap.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

window.addStudent = async function() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const studentClass = document.getElementById("class").value;
  const parentPhone = document.getElementById("parentPhone").value;

  await addDoc(collection(db, "students", schoolId, "list"), {
    name,
    email,
    class: studentClass,
    parentPhone,
    createdAt: new Date()
  });

  alert("Student Added!");
  loadStudents();
}

window.deleteStudent = async function(id) {
  await deleteDoc(doc(db, "students", schoolId, "list", id));
  alert("Student Deleted");
  loadStudents();
}

window.editStudent = async function(id, name, studentClass) {
  const newName = prompt("Edit Name:", name);
  const newClass = prompt("Edit Class:", studentClass);

  await updateDoc(doc(db, "students", schoolId, "list", id), {
    name: newName,
    class: newClass
  });

  alert("Updated!");
  loadStudents();
}

window.logout = function() {
  signOut(auth);
  window.location.href="login.html";
}

loadStudents();
</script>

</body>
</html>
