  .modal-content { background-color: #fff; margin: 5% auto; padding: 30px; border-radius: 8px; width: 90%; max-width: 600px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: slideIn 0.3s; }
  @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-content h3 { color: #002147; margin-bottom: 20px; }
  .modal-content p { margin: 10px 0; color: #555; line-height: 1.6; }
  .modal-content label { display: block; margin-top: 15px; font-weight: 600; color: #002147; }
  .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Poppins', sans-serif; }
  .modal-content textarea { resize: vertical; min-height: 80px; }
  .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .modal-buttons button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
  .btn-confirm { background: #28a745; color: white; }

  .btn-cancel { background: #ccc; color: #333; }

<nav>

<div class="container">
  <div id="alertBox"></div>
  <div class="header-section">
    <div>
      <h2>Student Admissions Management</h2>
      <p style="color: #666;">Review, approve, and manage student admissions</p>

  </div>

  <div class="stats" id="statsContainer">

<!-- ===== Firebase Script ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// ==== Firebase Config ====
const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c",
  storageBucket: "my-school-project-6e00c.firebasestorage.app",
  messagingSenderId: "14283853516",
  appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
  measurementId: "G-LTJZ2RDG15"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const tableBody = document.querySelector("#admissionsTable tbody");
const logoutBtn = document.getElementById("logoutBtn");
const loadingDiv = document.getElementById("loadingDiv");
const admissionsTable = document.getElementById("admissionsTable");
const alertBox = document.getElementById("alertBox");
let allAdmissions = [], currentAdmissionId = null;

// ===== Auth =====
onAuthStateChanged(auth, (user) => {
  if (user && user.email === "nicholasbagenda@gmail.com") { loadAdmissions(); } 
  else { window.location.href = "admin-dashboard.html"; }
});
logoutBtn.addEventListener("click", () => signOut(auth).then(()=>window.location.href="admin-dashboard.html"));

// ===== Load Admissions =====
async function loadAdmissions() {
  loadingDiv.style.display = "block"; admissionsTable.style.display="none";
  try {
    const q = query(collection(db,"admissions"), orderBy("submittedAt","desc"));
    const snapshot = await getDocs(q);
    allAdmissions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    displayAdmissions(allAdmissions); updateStats();
    loadingDiv.style.display="none"; admissionsTable.style.display="table";
  } catch(e){ console.error(e); showAlert("Error: "+e.message,"error"); loadingDiv.style.display="none"; }
}

// ===== Display Admissions =====
function displayAdmissions(admissions){
  tableBody.innerHTML="";
  if(!admissions.length){ tableBody.innerHTML="<tr><td colspan='9' style='text-align:center;padding:20px;'>No admissions found</td></tr>"; return; }
  admissions.forEach(adm=>{
    const status = adm.status||"pending";
    const statusBadge = getStatusBadge(status);
    const submittedDate = adm.submittedAt?.toDate? adm.submittedAt.toDate().toLocaleDateString() : "N/A";
    tableBody.innerHTML+=`
      <tr>
        <td>${adm.studentName||"N/A"}</td>
        <td>${adm.dob||"N/A"}</td>
        <td>${adm.class||"N/A"}</td>
        <td>${adm.parentName||"N/A"}</td>
        <td>${adm.parentEmail||"N/A"}</td>
        <td>${adm.parentPhone||"N/A"}</td>
        <td>${statusBadge}</td>
        <td>${submittedDate}</td>
        <td>
          <div class="action-buttons">
            <button class="btn btn-view" onclick="viewAdmission('${adm.id}')">View</button>
            ${status==="pending"||status==="reviewed"?`<button class="btn btn-approve" onclick="openApproveModal('${adm.id}','${adm.studentName}')">Approve</button>
            <button class="btn btn-reject" onclick="openRejectModal('${adm.id}','${adm.studentName}')">Reject</button>`:""}
            ${status==="approved"?`<button class="btn btn-edit" onclick="openEditModal('${adm.id}')">Edit</button>
            <button class="btn btn-reset" onclick="openResetPasswordModal('${adm.id}','${adm.studentName}')">Reset Pass</button>`:""}
            <button class="btn btn-reject" style="background:#ff4d4d;" onclick="deleteStudent('${adm.id}','${adm.studentName}')">Delete</button>
          </div>
        </td>
      </tr>`;
  });
}

function getStatusBadge(status){
  const badges = { "pending":'<span class="status-badge status-pending">Pending</span>',
                   "reviewed":'<span class="status-badge status-reviewed">Reviewed</span>',
                   "approved":'<span class="status-badge status-approved">Approved</span>',
                   "rejected":'<span class="status-badge status-rejected">Rejected</span>' };
  return badges[status]||badges["pending"];
}

// ===== Delete Student =====
window.deleteStudent = async function(studentId, studentName){
  if(!confirm(`Delete ${studentName}? This cannot be undone.`)) return;
  try{
    await deleteDoc(doc(db,"admissions",studentId));
    await deleteDoc(doc(db,"students",studentId));
    await deleteDoc(doc(db,"users",studentId));
    allAdmissions = allAdmissions.filter(a=>a.id!==studentId);
    displayAdmissions(allAdmissions); updateStats();
    showAlert(`${studentName} deleted successfully!`,"success");
  }catch(e){ console.error(e); showAlert("Error deleting student: "+e.message,"error"); }
}

// ===== Filters =====
function applyFilters(){
  const status = document.getElementById("statusFilter").value.toLowerCase();
  const term = document.getElementById("searchInput").value.toLowerCase();
  let filtered = allAdmissions;
  if(status) filtered = filtered.filter(a=>(a.status||"pending")===status);
  if(term) filtered = filtered.filter(a=>(a.studentName||"").toLowerCase().includes(term)||(a.parentName||"").toLowerCase().includes(term)||(a.parentEmail||"").toLowerCase().includes(term));
  displayAdmissions(filtered);
}

// ===== Stats =====
function updateStats(){
  const stats={pending:allAdmissions.filter(a=>a.status==="pending").length,
               approved:allAdmissions.filter(a=>a.status==="approved").length,
               rejected:allAdmissions.filter(a=>a.status==="rejected").length,
               total:allAdmissions.length};
  document.getElementById("statPending").textContent=stats.pending;
  document.getElementById("statApproved").textContent=stats.approved;
  document.getElementById("statRejected").textContent=stats.rejected;
  document.getElementById("statTotal").textContent=stats.total;
}

// ===== Alerts =====
function showAlert(msg,type){ alertBox.innerHTML=`<div class="alert alert
