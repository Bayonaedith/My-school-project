<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | St Paul Learning Centre</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
    
    <style>
        /* CSS MERGED & CLEANED */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; }

        /* Top Bar */
        .topbar {
            background: #002147;
            color: white;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        .menu-btn { font-size: 22px; cursor: pointer; margin-right: 20px; }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: -260px;
            top: 0;
            width: 250px;
            height: 100%;
            background: #001a35;
            color: white;
            transition: 0.3s ease;
            padding-top: 80px;
            z-index: 1000;
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
            transition: 0.2s;
        }
        .sidebar a:hover { background: #004aad; }
        .sidebar i { margin-right: 10px; }

        /* Overlay */
        .overlay {
            position: fixed;
            display: none;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 900;
        }
        .overlay.active { display: block; }

        /* Dashboard Styles */
        .container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #002147; color: white; }

        .btn { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; margin: 2px; }
        .btn-view { background: #007bff; color: white; }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }
        .btn-logout { background: #ffcc00; color: #000; padding: 10px 20px; border-radius: 5px; font-weight: 700; }

        /* Status Badges */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d4edda; color: #155724; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 8px; width: 90%; max-width: 600px; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="display: flex; align-items: center;">
        <i class="fa-solid fa-bars menu-btn" onclick="toggleMenu()"></i>
        <h2>St Paul Admin</h2>
    </div>
    <button class="btn btn-logout" id="logoutBtn">Logout</button>
</div>

<div class="sidebar" id="sidebar">
    <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
    <a href="admin-dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="student-login.html"><i class="fa-solid fa-user"></i> Students</a>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="container">
    <div id="alertBox"></div>

    <div class="header-section">
        <h2>Student Admissions Management</h2>
        <p>Review and process new applications.</p>
    </div>

    <div class="stats">
        <div class="stat-card">Pending <h3 id="statPending">0</h3></div>
        <div class="stat-card">Approved <h3 id="statApproved">0</h3></div>
        <div class="stat-card">Total <h3 id="statTotal">0</h3></div>
    </div>

    <div style="margin-bottom: 20px;">
        <input type="text" id="searchInput" placeholder="Search students..." style="padding: 10px; width: 300px;">
        <button onclick="applyFilters()" class="btn btn-view" style="padding: 10px 20px;">Search</button>
    </div>

    <table id="admissionsTable">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Class</th>
                <th>Parent Email</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<div id="rejectModal" class="modal">
    <div class="modal-content">
        <h3>Reject Admission</h3>
        <p>Student: <span id="rejectStudentName"></span></p>
        <textarea id="rejectionReason" placeholder="Reason..." style="width:100%; height:100px; margin-top:10px;"></textarea>
        <div style="margin-top:15px; text-align:right;">
            <button class="btn" onclick="closeModal('rejectModal')">Cancel</button>
            <button class="btn btn-reject" onclick="confirmReject()">Confirm Reject</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, doc, updateDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
        authDomain: "my-school-project-6e00c.firebaseapp.com",
        projectId: "my-school-project-6e00c",
        storageBucket: "my-school-project-6e00c.firebasestorage.app",
        messagingSenderId: "14283853516",
        appId: "1:14283853516:web:c7999ae32d83166cb8bc69"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // EmailJS Init
    emailjs.init("S17h9x6ExMG6mKaQh");

    // UI Helpers
    window.toggleMenu = function() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    };

    window.closeModal = (id) => document.getElementById(id).style.display = "none";
    window.openModal = (id) => document.getElementById(id).style.display = "block";

    // Auth Check
    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "admin-login.html";
        else loadAdmissions();
    });

    // Load Data
    async function loadAdmissions() {
        const q = query(collection(db, "admissions"), orderBy("submittedAt", "desc"));
        const snapshot = await getDocs(q);
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        
        let pending = 0, approved = 0;

        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const id = docSnap.id;
            if(data.status === 'approved') approved++; else pending++;

            tbody.innerHTML += `
                <tr>
                    <td>${data.studentName}</td>
                    <td>${data.class}</td>
                    <td>${data.parentEmail}</td>
                    <td><span class="status-badge status-${data.status || 'pending'}">${data.status || 'pending'}</span></td>
                    <td>
                        <button class="btn btn-approve" onclick="approveAdmission('${id}')">Approve</button>
                        <button class="btn btn-reject" onclick="openReject('${id}', '${data.studentName}')">Reject</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById("statPending").innerText = pending;
        document.getElementById("statApproved").innerText = approved;
        document.getElementById("statTotal").innerText = pending + approved;
    }

    // Logic for Logout
    document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

    // Expose functions for buttons
    window.loadAdmissions = loadAdmissions;
</script>

</body>
</html>
