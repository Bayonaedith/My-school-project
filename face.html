<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart School Attendance | St Paul Learning Centre</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Face-api.js -->
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<!-- Styling -->
<style>
body {
    font-family: 'Poppins', sans-serif;
    background:#0f172a;
    color:#fff;
    text-align:center;
    margin:0;
    padding:0;
}
h1 { color:#22c55e; margin-top:20px; text-shadow: 0 0 10px #22c55e;}
input, button {
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    border-radius:8px;
    border:none;
    outline:none;
}
input { width:200px; }
button { background:#22c55e; color:#0f172a; font-weight:bold; cursor:pointer; box-shadow:0 0 10px #22c55e; transition:0.3s;}
button:hover { box-shadow:0 0 20px #22c55e; }
#videoElement { width:480px; height:360px; border:2px solid #22c55e; border-radius:12px; margin-top:20px;}
#status { margin-top:15px; font-weight:bold; font-size:18px;}
#dashboard { margin-top:30px; display:flex; flex-wrap:wrap; justify-content:center; }
.studentCard { background:#1e293b; margin:10px; padding:10px; border-radius:10px; width:150px; text-align:center; box-shadow:0 0 10px #22c55e; }
.studentCard img { width:100px; height:100px; border-radius:50%; border:2px solid #22c55e; }
.studentCard p { margin:5px 0; }
</style>
</head>
<body>

<h1>Smart School Attendance</h1>
<p>Register face or start attendance</p>

<input type="text" id="studentName" placeholder="Enter Your Name" />
<br>
<button id="registerBtn">Register Face</button>
<button id="startAttendanceBtn">Start Attendance</button>

<video id="videoElement" autoplay muted></video>
<p id="status">Waiting...</p>

<div id="dashboard"></div>

<script>
// 🔹 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c",
  storageBucket: "my-school-project-6e00c.appspot.com",
  messagingSenderId: "14283853516",
  appId: "1:14283853516:web:c7999ae32d83166cb8bc69"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const video = document.getElementById('videoElement');
const status = document.getElementById('status');
const dashboard = document.getElementById('dashboard');

// Camera handling
async function startVideo() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video:true });
        video.srcObject = stream;
    } catch (e) {
        status.innerText = "Cannot access camera. Close other apps and allow permission!";
    }
}
startVideo();

// Load Face-api.js models
Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri('/models'),
    faceapi.nets.faceLandmark68Net.loadFromUri('/models'),
    faceapi.nets.faceRecognitionNet.loadFromUri('/models')
]).then(() => status.innerText = "Models Loaded. Ready!");

// ---------- REGISTER STUDENT ----------
document.getElementById('registerBtn').addEventListener('click', async () => {
    const name = document.getElementById('studentName').value.trim();
    if(!name) return alert("Enter your name!");

    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks()
        .withFaceDescriptor();

    if(!detection) return status.innerText = "No face detected!";
    
    const descriptorArray = Array.from(detection.descriptor);

    await db.collection('students').doc(name).set({
        name,
        faceDescriptor: descriptorArray,
        lastAttendance: null
    });

    status.innerText = `${name} registered successfully! ✅`;
});

// ---------- START ATTENDANCE ----------
document.getElementById('startAttendanceBtn').addEventListener('click', async () => {
    status.innerText = "Starting attendance...";

    // Load all student descriptors
    const snapshot = await db.collection('students').get();
    const labeledDescriptors = snapshot.docs.map(doc => {
        return new faceapi.LabeledFaceDescriptors(
            doc.data().name,
            [new Float32Array(doc.data().faceDescriptor)]
        );
    });
    const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.5);

    // Clear dashboard
    dashboard.innerHTML = '';
    snapshot.docs.forEach(doc => {
        const card = document.createElement('div');
        card.classList.add('studentCard');
        card.id = 'card-' + doc.data().name;
        card.innerHTML = `<p>${doc.data().name}</p><p id="time-${doc.data().name}">Not marked</p>`;
        dashboard.appendChild(card);
    });

    video.addEventListener('play', () => {
        const canvas = faceapi.createCanvasFromMedia(video);
        document.body.append(canvas);
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptors();
            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
            faceapi.draw.drawDetections(canvas, resizedDetections);

            resizedDetections.forEach(async det => {
                const bestMatch = faceMatcher.findBestMatch(det.descriptor);
                if(bestMatch.label !== "unknown") {
                    const studentRef = db.collection('students').doc(bestMatch.label);
                    const studentDoc = await studentRef.get();
                    const now = new Date().toLocaleString();
                    
                    // Mark only once per day
                    if(!studentDoc.data().lastAttendance || studentDoc.data().lastAttendance.split(',')[0] !== new Date().toLocaleDateString()) {
                        await studentRef.update({ lastAttendance: now });
                        status.innerText = `Attendance marked: ${bestMatch.label} at ${now}`;
                        document.getElementById('time-' + bestMatch.label).innerText = now;
                    }
                }
            });
        }, 2000);
    });
});
</script>

</body>
</html>
