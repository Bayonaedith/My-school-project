<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Your provided Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
        authDomain: "my-school-project-6e00c.firebaseapp.com",
        projectId: "my-school-project-6e00c",
        storageBucket: "my-school-project-6e00c.appspot.com",
        messagingSenderId: "14283853516",
        appId: "1:14283853516:web:c7999ae32d83166cb8bc69"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const video = document.getElementById("video");
    const status = document.getElementById("status");
    const regBtn = document.getElementById("regBtn");

    // Load AI Models
    async function loadModels() {
        status.innerText = "Loading AI Models...";
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            status.innerText = "AI Loaded. Initializing Camera...";
            startCamera();
        } catch (err) {
            status.innerText = "Error loading AI: Check internet connection.";
            console.error(err);
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            status.innerText = "System Ready";
        } catch (err) {
            status.innerText = "Camera access denied.";
        }
    }

    // Handle Registration Click
    regBtn.addEventListener('click', async () => {
        const name = document.getElementById("name").value.trim();
        const studentClass = document.getElementById("class").value.trim();

        if (!name || !studentClass) {
            status.innerText = "Error: Please provide Name and Class.";
            return;
        }

        status.innerText = "Scanning face...";

        const detection = await faceapi
            .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (!detection) {
            status.innerText = "Face not found. Please look at the camera.";
            return;
        }

        // Convert the face descriptor to a standard array for Firestore
        const descriptorArray = Array.from(detection.descriptor);

        try {
            await addDoc(collection(db, "students"), {
                name: name,
                class: studentClass,
                faceDescriptor: descriptorArray,
                approved: false,
                createdAt: serverTimestamp()
            });
            status.innerText = "Success! " + name + " is registered and pending approval.";
            
            // Clear inputs
            document.getElementById("name").value = "";
            document.getElementById("class").value = "";
        } catch (error) {
            status.innerText = "Database error. Check Firebase Rules.";
            console.error("Firebase Error:", error);
        }
    });

    loadModels();
</script>
