<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | St Paul Learning Centre</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    /* --- BASE STYLES --- */
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    /* --- NAVIGATION & SIDEBAR (Consistent with Academics) --- */
    .topbar {
      background: #004aad;
      color: white;
      padding: 15px 25px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 800;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
      margin-right: 20px;
    }

    .sidebar {
      position: fixed;
      left: -260px;
      top: 0;
      width: 250px;
      height: 100%;
      background: #002b80;
      color: white;
      transition: 0.3s ease;
      padding-top: 60px;
      z-index: 1000;
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar a {
      display: block;
      padding: 15px 20px;
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    .sidebar a:hover {
      background: #004aad;
    }

    .sidebar i {
      margin-right: 10px;
    }

    .overlay {
      position: fixed;
      display: none;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 900;
    }

    .overlay.active {
      display: block;
    }

    /* --- PAGE HEADER --- */
    .page-header {
      background: #001f3f;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .page-header h2 {
      margin: 0;
      font-size: 32px;
    }

    /* --- GALLERY GRID --- */
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 40px 20px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      overflow: hidden;
      border-radius: 12px;
      background: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .gallery-item img {
      width: 100%;
      height: 250px; /* Fixed height for uniformity */
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
    }

    .gallery-item:hover img {
      transform: scale(1.1);
    }

    /* --- LIGHTBOX STYLES --- */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border: 3px solid white;
      border-radius: 5px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .lightbox:target {
      display: flex;
    }

    .close-btn {
      position: absolute;
      top: 30px;
      right: 40px;
      color: #ffcc00;
      font-size: 40px;
      text-decoration: none;
      font-weight: bold;
    }

    /* --- FOOTER --- */
    footer {
      text-align: center;
      padding: 30px;
      background: #00132b;
      color: white;
      margin-top: 50px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <i class="fa-solid fa-bars menu-btn" onclick="toggleMenu()"></i>
  <h3>St Paul Learning Centre</h3>
</div>

<div class="sidebar" id="sidebar">
  <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
  <a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
  <a href="academics.html"><i class="fa-solid fa-book-open"></i> Academics</a>
  <a href="gallery.html"><i class="fa-solid fa-images"></i> Gallery</a>
  <a href="admissions.html"><i class="fa-solid fa-user-graduate"></i> Admissions</a>
  <a href="admin-dashboard.html"><i class="fa-solid fa-user-lock"></i> Admin</a>
  <a href="student-portal.html"><i class="fa-solid fa-user"></i> Student Login</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<header class="page-header">
  <h2>School Gallery</h2>
  <p>Capturing precious moments at St Paul Learning Centre</p>
</header>

<div class="container">
  <div class="gallery-grid">
    <div class="gallery-item">
      <a href="#img1"><img src="images/school1.jpg" alt="School Life"></a>
    </div>
    <div class="gallery-item">
      <a href="#img2"><img src="images/school2.jpg" alt="Classroom Activities"></a>
    </div>
    <div class="gallery-item">
      <a href="#img3"><img src="images/school3.jpg" alt="Sports Day"></a>
    </div>
    <div class="gallery-item">
      <a href="#img4"><img src="images/school4.jpg" alt="Graduation Ceremony"></a>
    </div>
    <div class="gallery-item">
      <a href="#img5"><img src="images/school5.jpg" alt="Creative Arts"></a>
    </div>
    <div class="gallery-item">
      <a href="#img6"><img src="images/school6.jpg" alt="Science Lab"></a>
    </div>
  </div>
</div>

<div id="img1" class="lightbox">
  <a href="#" class="close-btn">&times;</a>
  <img src="images/school1.jpg" alt="School Photo 1">
</div>

<div id="img2" class="lightbox">
  <a href="#" class="close-btn">&times;</a>
  <img src="images/school2.jpg" alt="School Photo 2">
</div>

<div id="img3" class="lightbox">
  <a href="#" class="close-btn">&times;</a>
  <img src="images/school3.jpg" alt="School Photo 3">
</div>

<div id="img4" class="lightbox">
  <a href="#" class="close-btn">&times;</a>
  <img src="images/school4.jpg" alt="School Photo 4">
</div>

<div id="img5" class="lightbox">
  <a href="#" class="close-btn">&times;</a>
  <img src="images/school5.jpg" alt="School Photo 5">
</div>

<div id="img6" class="lightbox">
  <a href="#" class="close-btn">&times;</a>
  <img src="images/school6.jpg" alt="School Photo 6">
</div>

<footer>
  © 2026 St Paul Learning Centre | All Rights Reserved
</footer>

<script>
  function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
  }

  // Close lightbox when clicking outside the image
  window.addEventListener('click', function(e) {
    if (e.target.classList.contains('lightbox')) {
      window.location.hash = '#';
    }
  });
</script>

</body>
</html>
