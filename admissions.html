<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St Paul Learning Centre | Admission</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    color: #002147;
  }

  form, .check-status {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  input, textarea, select, button {
    padding: 12px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ccc;
    width: 100%;
    box-sizing: border-box;
  }

  button {
    background: #ffcc00;
    color: #002147;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }

  button:hover {
    background: #e6b800;
  }

  .status-card {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .status-card p {
    margin: 5px 0;
    font-size: 16px;
  }

  .status-approved {
    color: #008000;
    font-weight: 600;
  }

  .status-pending {
    color: #d9534f;
    font-weight: 600;
  }

  #checkInput {
    margin-top: 10px;
  }

  #statusResult {
    margin-top: 15px;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Student Admission Form</h2>
  <form id="admissionForm">
    <input type="text" name="studentName" placeholder="Student Name" required>
    <input type="date" name="dob" placeholder="Date of Birth" required>
    <select name="class" required>
      <option value="">Select Class</option>
      <option value="Primary 1">Primary 1</option>
      <option value="Primary 2">Primary 2</option>
      <option value="Primary 3">Primary 3</option>
      <option value="Primary 4">Primary 4</option>
      <option value="Primary 5">Primary 5</option>
      <option value="Primary 6">Primary 6</option>
    </select>
    <input type="text" name="parentName" placeholder="Parent/Guardian Name" required>
    <input type="email" name="parentEmail" placeholder="Parent/Guardian Email" required>
    <input type="tel" name="parentPhone" placeholder="Phone Number" required>
    <textarea name="additionalInfo" placeholder="Message / Additional Info" rows="4"></textarea>
    <button type="submit">Submit Application</button>
  </form>
</div>

<div class="container">
  <h2>Check Admission Status</h2>
  <input type="text" id="checkInput" placeholder="Enter Student Name or Email">
  <button id="checkBtn">Check Status</button>
  <div id="statusResult"></div>
</div>

<!-- EmailJS SDK -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
    authDomain: "my-school-project-6e00c.firebaseapp.com",
    projectId: "my-school-project-6e00c",
    storageBucket: "my-school-project-6e00c.appspot.com",
    messagingSenderId: "14283853516",
    appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
    measurementId: "G-LTJZ2RDG15"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Initialize EmailJS
  (function(){
    emailjs.init('S17h9x6ExMG6mKaQh'); // Your Public Key
  })();

  // Handle form submission
  const form = document.getElementById('admissionForm');
  form.addEventListener('submit', async function(event) {
    event.preventDefault();

    const data = {
      studentName: this.studentName.value,
      dob: this.dob.value,
      class: this.class.value,
      parentName: this.parentName.value,
      parentEmail: this.parentEmail.value,
      parentPhone: this.parentPhone.value,
      additionalInfo: this.additionalInfo.value,
      approved: false, // default
      submittedAt: serverTimestamp()
    };

    try {
      await addDoc(collection(db, "admissions"), data);
      await emailjs.sendForm('service_ndh30l8', 'template_0k9iqza', this);
      alert('Application submitted successfully!');
      form.reset();
    } catch (err) {
      console.error(err);
      alert('Error submitting application. Please try again.');
    }
  });

  // Handle status check
  const checkBtn = document.getElementById('checkBtn');
  const checkInput = document.getElementById('checkInput');
  const statusResult = document.getElementById('statusResult');

  checkBtn.addEventListener('click', async () => {
    const search = checkInput.value.trim();
    if(!search){
      statusResult.textContent = 'Please enter a Name or Email.';
      return;
    }

    const qEmail = query(collection(db, "admissions"), where("parentEmail", "==", search));
    const qName = query(collection(db, "admissions"), where("studentName", "==", search));

    let results = [];
    const querySnapshotEmail = await getDocs(qEmail);
    querySnapshotEmail.forEach(doc => results.push(doc.data()));

    const querySnapshotName = await getDocs(qName);
    querySnapshotName.forEach(doc => results.push(doc.data()));

    if(results.length === 0){
      statusResult.innerHTML = `<p>No admission record found.</p>`;
    } else {
      statusResult.innerHTML = results.map(r => `
        <div class="status-card">
          <p><strong>Name:</strong> ${r.studentName}</p>
          <p><strong>Class:</strong> ${r.class}</p>
          <p><strong>Status:</strong> <span class="${r.approved ? 'status-approved' : 'status-pending'}">
            ${r.approved ? 'Approved ✅' : 'Pending ❌'}
          </span></p>
        </div>
      `).join('');
    }
  });
</script>

</body>
</html>
