<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St Paul Learning Centre | Admission Form</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
  .container { max-width: 650px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  h2 { text-align: center; color: #002147; margin-bottom: 25px; }
  form { display: flex; flex-direction: column; gap: 15px; }
  input, textarea, select, button { padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
  button { background: #ffcc00; color: #002147; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; }
  button:hover { background: #e6b800; }
  .status-section { margin-top: 40px; }
  .status-card { background: #f1f1f1; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
  .status-approved { color: green; font-weight: bold; }
  .status-pending { color: orange; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
  <h2>Student Admission Form</h2>
  <form id="admissionForm">
    <input type="text" name="studentName" placeholder="Student Name" required>
    <input type="date" name="dob" placeholder="Date of Birth" required>
    <select name="class" required>
      <option value="">Select Class</option>
      <option value="Primary 1">Primary 1</option>
      <option value="Primary 2">Primary 2</option>
      <option value="Primary 3">Primary 3</option>
      <option value="Primary 4">Primary 4</option>
      <option value="Primary 5">Primary 5</option>
      <option value="Primary 6">Primary 6</option>
    </select>
    <input type="text" name="parentName" placeholder="Parent/Guardian Name" required>
    <input type="email" name="parentEmail" placeholder="Parent/Guardian Email" required>
    <input type="tel" name="parentPhone" placeholder="Phone Number" required>
    <textarea name="additionalInfo" placeholder="Message / Additional Info" rows="4"></textarea>
    <button type="submit">Submit Application</button>
  </form>

  <div class="status-section">
    <h2>Check Your Admission Status</h2>
    <input type="text" id="statusInput" placeholder="Enter your Name or Email">
    <button id="checkStatusBtn">Check Status</button>
    <div id="statusResult"></div>
  </div>
</div>

<!-- EmailJS SDK -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
    authDomain: "my-school-project-6e00c.firebaseapp.com",
    projectId: "my-school-project-6e00c",
    storageBucket: "my-school-project-6e00c.appspot.com",
    messagingSenderId: "14283853516",
    appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
    measurementId: "G-LTJZ2RDG15"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Initialize EmailJS
  (function(){ emailjs.init('S17h9x6ExMG6mKaQh'); })();

  const form = document.getElementById('admissionForm');
  const statusInput = document.getElementById('statusInput');
  const checkStatusBtn = document.getElementById('checkStatusBtn');
  const statusResult = document.getElementById('statusResult');

  // Submit Admission Form
  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const data = {
      studentName: this.studentName.value,
      dob: this.dob.value,
      class: this.class.value,
      parentName: this.parentName.value,
      parentEmail: this.parentEmail.value,
      parentPhone: this.parentPhone.value,
      additionalInfo: this.additionalInfo.value,
      approved: false, // default pending
      submittedAt: serverTimestamp()
    };
    try {
      await addDoc(collection(db, "admissions"), data);
      await emailjs.sendForm('service_ndh30l8', 'template_0k9iqza', this);
      alert('Application submitted successfully!');
      form.reset();
    } catch(err){
      console.error(err);
      alert('Something went wrong. Please try again.');
    }
  });

  // Check Admission Status
  checkStatusBtn.addEventListener('click', async () => {
    const search = statusInput.value.trim().toLowerCase();
    if(!search) return alert("Enter Name or Email");

    const snapshot = await getDocs(collection(db, "admissions"));
    const results = [];

    snapshot.forEach(doc => {
      const d = doc.data();
      if(d.studentName.toLowerCase() === search || d.parentEmail.toLowerCase() === search){
        results.push(d);
      }
    });

    if(results.length === 0){
      statusResult.innerHTML = "<p>No record found.</p>";
      return;
    }

    statusResult.innerHTML = results.map(r => `
      <div class="status-card">
        <p><strong>Name:</strong> ${r.studentName}</p>
        <p><strong>Class:</strong> ${r.class}</p>
        <p><strong>Status:</strong> <span class="${r.approved ? 'status-approved' : 'status-pending'}">
          ${r.approved ? 'Approved ✅' : 'Pending ❌'}
        </span></p>
      </div>
    `).join('');
  });
</script>

</body>
</html>
