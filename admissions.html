<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>St Paul Learning Centre | Admission</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#002147;
margin-bottom:25px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
margin-bottom:30px;
}

input,textarea,select,button{
padding:12px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
width:100%;
box-sizing:border-box;
}

button{
background:#004aad;
color:#fff;
font-weight:600;
cursor:pointer;
border:none;
}

button:hover{
background:#003080;
}

.data-item{
background:#f1f1f1;
padding:15px;
margin-bottom:10px;
border-radius:5px;
}

.status-approved{
color:green;
font-weight:bold;
}

.status-pending{
color:orange;
font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h2>Student Admission Form</h2>

<form id="admissionForm">

<input type="text" name="studentName" placeholder="Student Name" required>

<input type="date" name="dob" required>

<select name="class" required>
<option value="">Select Class</option>
<option value="Primary 1">Primary 1</option>
<option value="Primary 2">Primary 2</option>
<option value="Primary 3">Primary 3</option>
<option value="Primary 4">Primary 4</option>
<option value="Primary 5">Primary 5</option>
<option value="Primary 6">Primary 6</option>
</select>

<input type="text" name="parentName" placeholder="Parent Name" required>

<input type="email" name="parentEmail" placeholder="Parent Email" required>

<input type="tel" name="parentPhone" placeholder="Phone Number" required>

<textarea name="additionalInfo" placeholder="Additional Message"></textarea>

<button type="submit">Submit Application</button>

</form>


<h2>Check Admission Status</h2>

<form id="searchForm">

<input type="text" id="searchInput" placeholder="Enter Student Name or Email" required>

<button type="submit">Search</button>

</form>

<div id="results"></div>

</div>


<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
authDomain: "my-school-project-6e00c.firebaseapp.com",
projectId: "my-school-project-6e00c",
storageBucket: "my-school-project-6e00c.appspot.com",
messagingSenderId: "14283853516",
appId: "1:14283853516:web:c7999ae32d83166cb8bc69"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* EMAILJS INIT */

emailjs.init("S17h9x6ExMG6mKaQh");


const admissionForm = document.getElementById("admissionForm");


admissionForm.addEventListener("submit", async (e)=>{

e.preventDefault();

const data = {

studentName: admissionForm.studentName.value,
dob: admissionForm.dob.value,
class: admissionForm.class.value,
parentName: admissionForm.parentName.value,
parentEmail: admissionForm.parentEmail.value,
parentPhone: admissionForm.parentPhone.value,
additionalInfo: admissionForm.additionalInfo.value,
status:"pending",
submittedAt: serverTimestamp()

};


try{

/* SAVE TO FIREBASE */

await addDoc(collection(db,"admissions"),data);


/* SEND EMAIL */

await emailjs.send(
"service_ndh30l8",
"template_0k9iqza",
{

student_name:data.studentName,
parent_name:data.parentName,
parent_email:data.parentEmail,
parent_phone:data.parentPhone,
student_class:data.class,
message:data.additionalInfo

}

);


alert("Application submitted successfully!");

admissionForm.reset();

}catch(err){

console.error(err);

alert("Error sending application");

}

});



/* SEARCH STATUS */

const searchForm=document.getElementById("searchForm");
const searchInput=document.getElementById("searchInput");
const results=document.getElementById("results");

searchForm.addEventListener("submit",async(e)=>{

e.preventDefault();

results.innerHTML="Searching...";

const value=searchInput.value.trim();

const admissionsCol=collection(db,"admissions");

const q1=query(admissionsCol,where("studentName","==",value));
const q2=query(admissionsCol,where("parentEmail","==",value));

const snap1=await getDocs(q1);
const snap2=await getDocs(q2);

const docs=[...snap1.docs,...snap2.docs];

if(docs.length===0){

results.innerHTML="No admission data found";

return;

}

results.innerHTML="";

docs.forEach(doc=>{

const r=doc.data();

results.innerHTML+=`

<div class="data-item">

<p><strong>Name:</strong> ${r.studentName}</p>

<p><strong>Class:</strong> ${r.class}</p>

<p><strong>Parent Email:</strong> ${r.parentEmail}</p>

<p><strong>Phone:</strong> ${r.parentPhone}</p>

<p><strong>Status:</strong>
<span class="${r.status==='approved'?'status-approved':'status-pending'}">
${r.status==='approved'?'Approved ✅':'Pending ⏳'}
</span>
</p>

</div>

`;

});

});

</script>

</body>
</html>
