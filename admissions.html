<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St Paul Learning Centre | Admission Status</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 700px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    color: #002147;
    margin-bottom: 25px;
  }

  form {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  input, button {
    padding: 12px;
    font-size: 16px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  input {
    flex: 1;
  }

  button {
    background: #004aad;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }

  button:hover {
    background: #003080;
  }

  .data-item {
    background:#f1f1f1;
    padding:15px;
    margin-bottom:10px;
    border-radius:5px;
  }

  .status-approved {
    color: green;
    font-weight: bold;
  }

  .status-pending {
    color: orange;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Check Your Admission Status</h2>

  <form id="searchForm">
    <input type="text" id="searchInput" placeholder="Enter your full name or email" required>
    <button type="submit">Search</button>
  </form>

  <div id="results"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
    authDomain: "my-school-project-6e00c.firebaseapp.com",
    projectId: "my-school-project-6e00c",
    storageBucket: "my-school-project-6e00c.appspot.com",
    messagingSenderId: "14283853516",
    appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
    measurementId: "G-LTJZ2RDG15"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const searchForm = document.getElementById('searchForm');
  const searchInput = document.getElementById('searchInput');
  const results = document.getElementById('results');

  searchForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    results.innerHTML = '<p>Searching...</p>';

    const searchValue = searchInput.value.trim().toLowerCase();

    try {
      const admissionsCol = collection(db, "admissions");

      // Query by name or email
      const qName = query(admissionsCol, where("studentName", "==", searchInput.value));
      const qEmail = query(admissionsCol, where("parentEmail", "==", searchInput.value));

      const [snapshotName, snapshotEmail] = await Promise.all([getDocs(qName), getDocs(qEmail)]);
      const combinedDocs = [...snapshotName.docs, ...snapshotEmail.docs];

      if(combinedDocs.length === 0){
        results.innerHTML = '<p>No admission data found.</p>';
      } else {
        results.innerHTML = '';
        combinedDocs.forEach(doc => {
          const r = doc.data();
          results.innerHTML += `
            <div class="data-item">
              <p><strong>Name:</strong> ${r.studentName}</p>
              <p><strong>Class:</strong> ${r.class}</p>
              <p><strong>Parent Email:</strong> ${r.parentEmail}</p>
              <p><strong>Phone:</strong> ${r.parentPhone}</p>
              <p><strong>Status:</strong> <span class="${r.status === 'approved' ? 'status-approved' : 'status-pending'}">
                ${r.status === 'approved' ? 'Approved ✅' : 'Pending ❌'}
              </span></p>
              <p><strong>Submitted At:</strong> ${r.submittedAt?.toDate ? r.submittedAt.toDate().toLocaleString() : '-'}</p>
            </div>
          `;
        });
      }
    } catch(err) {
      console.error(err);
      results.innerHTML = '<p>Error fetching data. Try again.</p>';
    }
  });
</script>

</body>
</html>
