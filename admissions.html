<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St Paul Learning Centre | Admission</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 0;
}
.container {
  max-width: 700px;
  margin: 50px auto;
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
h2 {
  text-align: center;
  color: #002147;
  margin-bottom: 25px;
}
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 30px;
}
input, textarea, select, button {
  padding: 12px;
  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #ccc;
  width: 100%;
  box-sizing: border-box;
}
button {
  background: #004aad;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
button:hover {
  background: #003080;
}
.data-item {
  background:#f1f1f1;
  padding:15px;
  margin-bottom:10px;
  border-radius:5px;
}
.status-approved {
  color: green;
  font-weight: bold;
}
.status-pending {
  color: orange;
  font-weight: bold;
}
.alert {
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 5px;
  text-align: center;
}
.alert-success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}
.alert-error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}
</style>
</head>
<body>

<div class="container">
  <h2>Student Admission Form</h2>
  <div id="formMessage"></div>
  <form id="admissionForm">
    <input type="text" name="studentName" placeholder="Student Name" required>
    <input type="date" name="dob" placeholder="Date of Birth" required>
    <select name="class" required>
      <option value="">Select Class</option>
      <option value="Primary 1">Primary 1</option>
      <option value="Primary 2">Primary 2</option>
      <option value="Primary 3">Primary 3</option>
      <option value="Primary 4">Primary 4</option>
      <option value="Primary 5">Primary 5</option>
      <option value="Primary 6">Primary 6</option>
    </select>
    <input type="text" name="parentName" placeholder="Parent/Guardian Name" required>
    <input type="email" name="parentEmail" placeholder="Parent/Guardian Email" required>
    <input type="tel" name="parentPhone" placeholder="Phone Number" required>
    <textarea name="additionalInfo" placeholder="Message / Additional Info" rows="4"></textarea>
    <button type="submit">Submit Application</button>
  </form>

  <h2>Check Your Admission Status</h2>
  <form id="searchForm">
    <input type="text" id="searchInput" placeholder="Enter your full name or email" required>
    <button type="submit">Search Status</button>
  </form>

  <div id="results"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// Initialize EmailJS
emailjs.init("S17h9x6ExMG6mKaQh");

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c",
  storageBucket: "my-school-project-6e00c.appspot.com",
  messagingSenderId: "14283853516",
  appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
  measurementId: "G-LTJZ2RDG15"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Admin email (change this to your admin email)
const ADMIN_EMAIL = "admin@stpaullearning.com"; // UPDATE THIS EMAIL

// Admission Form Submission
const admissionForm = document.getElementById('admissionForm');
const formMessage = document.getElementById('formMessage');

admissionForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const data = {
    studentName: admissionForm.studentName.value,
    dob: admissionForm.dob.value,
    class: admissionForm.class.value,
    parentName: admissionForm.parentName.value,
    parentEmail: admissionForm.parentEmail.value,
    parentPhone: admissionForm.parentPhone.value,
    additionalInfo: admissionForm.additionalInfo.value,
    status: "pending",
    submittedAt: serverTimestamp()
  };

  try {
    // Save to Firebase
    const docRef = await addDoc(collection(db, "admissions"), data);
    
    // Send email to admin
    await sendAdmissionEmailToAdmin(data);
    
    // Show success message
    formMessage.innerHTML = '<div class="alert alert-success">✅ Application submitted successfully! Admin notification has been sent.</div>';
    admissionForm.reset();
    
    // Clear message after 5 seconds
    setTimeout(() => {
      formMessage.innerHTML = '';
    }, 5000);
    
  } catch(err) {
    console.error(err);
    formMessage.innerHTML = '<div class="alert alert-error">❌ Error submitting application. Please try again.</div>';
  }
});

// Function to send email to admin
async function sendAdmissionEmailToAdmin(data) {
  const emailParams = {
    to_email: ADMIN_EMAIL,
    student_name: data.studentName,
    dob: data.dob,
    class: data.class,
    parent_name: data.parentName,
    parent_email: data.parentEmail,
    parent_phone: data.parentPhone,
    additional_info: data.additionalInfo || "None",
    submission_date: new Date().toLocaleString()
  };

  try {
    const response = await emailjs.send(
      "service_ndh30l8",           // Service ID
      "template_0k9iqza",          // Template ID
      emailParams
    );
    console.log("Email sent successfully:", response);
  } catch(error) {
    console.error("Email send error:", error);
    // Don't throw error - admission was saved even if email fails
  }
}

// Search / Status Check
const searchForm = document.getElementById('searchForm');
const searchInput = document.getElementById('searchInput');
const results = document.getElementById('results');

searchForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  results.innerHTML = "<p>Searching...</p>";
  const searchValue = searchInput.value.trim();

  try {
    const admissionsCol = collection(db, "admissions");

    // Query by name OR email
    const qName = query(admissionsCol, where("studentName", "==", searchValue));
    const qEmail = query(admissionsCol, where("parentEmail", "==", searchValue));
    const [snapshotName, snapshotEmail] = await Promise.all([getDocs(qName), getDocs(qEmail)]);
    const combinedDocs = [...snapshotName.docs, ...snapshotEmail.docs];

    if(combinedDocs.length === 0){
      results.innerHTML = "<p>No admission data found.</p>";
    } else {
      results.innerHTML = "";
      combinedDocs.forEach(doc => {
        const r = doc.data();
        results.innerHTML += `
          <div class="data-item">
            <p><strong>Name:</strong> ${r.studentName}</p>
            <p><strong>Class:</strong> ${r.class}</p>
            <p><strong>Parent Email:</strong> ${r.parentEmail}</p>
            <p><strong>Phone:</strong> ${r.parentPhone}</p>
            <p><strong>Status:</strong> <span class="${r.status === 'approved' ? 'status-approved' : 'status-pending'}">
              ${r.status === 'approved' ? 'Approved ✅' : 'Pending ❌'}
            </span></p>
            <p><strong>Submitted At:</strong> ${r.submittedAt?.toDate ? r.submittedAt.toDate().toLocaleString() : '-'}</p>
          </div>
        `;
      });
    }
  } catch(err) {
    console.error(err);
    results.innerHTML = "<p>Error fetching data. Try again.</p>";
  }
});
</script>
</body>
</html>
