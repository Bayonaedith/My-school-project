<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>
<style>
body{background:#0f172a;color:white;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#1e293b;padding:40px;border-radius:12px;box-shadow:0 0 20px #00f0ff}
input,button{width:100%;padding:10px;margin:10px 0}
button{background:#00f0ff;border:none}
</style>
</head>
<body>
<div class="card">
<h2>Student Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="loginStudent()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c",
  storageBucket: "my-school-project-6e00c.firebasestorage.app",
  messagingSenderId: "14283853516",
  appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
  measurementId: "G-LTJZ2RDG15"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginStudent = async function(){
  await signInWithEmailAndPassword(auth,email.value,password.value);
  window.location.href="student-dashboard.html";
}
</script>
</body>
</html>
