<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ST Paul Learning Centre | Student Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
    header { background:#004aad; color:#fff; padding:20px; text-align:center; }
    h1 { margin:0; }
    .container { max-width:600px; margin:40px auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); }
    button { margin-top:20px; padding:15px; width:100%; background:#004aad; color:#fff; border:none; border-radius:5px; font-size:16px; cursor:pointer; }
    button:hover { background:#003080; }
    .hidden { display:none; }
    input { width: 100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
    #errorMsg { color:red; }
  </style>
</head>
<body>

<header>
  <h1>ST Paul Learning Centre | Student Portal</h1>
</header>

<div class="container">
  <div id="loginSection">
    <button id="googleSignIn"><i class="fa-brands fa-google"></i> Sign in with Google</button>
    <button id="emailSignIn"><i class="fa-solid fa-envelope"></i> Sign in with Email</button>
  </div>

  <div id="emailLoginForm" class="hidden">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="emailSignInBtn">Sign In</button>
    <button id="emailSignUpBtn">Sign Up</button>
    <button id="backBtn">Back</button>
    <p id="errorMsg"></p>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
    authDomain: "my-school-project-6e00c.firebaseapp.com",
    projectId: "my-school-project-6e00c",
    storageBucket: "my-school-project-6e00c.firebasestorage.app",
    messagingSenderId: "14283853516",
    appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
    measurementId: "G-LTJZ2RDG15"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginSection = document.getElementById('loginSection');
  const emailLoginForm = document.getElementById('emailLoginForm');
  const errorMsg = document.getElementById('errorMsg');

  // Google Sign In
  document.getElementById('googleSignIn').addEventListener('click', async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      redirectUser(user.email);
    } catch (error) {
      alert(error.message);
    }
  });

  // Email Sign In button
  document.getElementById('emailSignIn').addEventListener('click', () => {
    loginSection.classList.add('hidden');
    emailLoginForm.classList.remove('hidden');
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    emailLoginForm.classList.add('hidden');
    loginSection.classList.remove('hidden');
    errorMsg.textContent = '';
  });

  // Email Sign In
  document.getElementById('emailSignInBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      redirectUser(userCredential.user.email);
    } catch (error) {
      errorMsg.textContent = error.message;
    }
  });

  // Email Sign Up
  document.getElementById('emailSignUpBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      redirectUser(userCredential.user.email);
    } catch (error) {
      errorMsg.textContent = error.message;
    }
  });

  // Redirect function
  function redirectUser(email){
    if(email === 'nicholasbagenda@gmail.com'){
      // Admin email
      window.location.href = 'admin-students.html';
    } else {
      // Regular student login
      window.location.href = 'admin-students.html';
      // Optional: create a separate student-portal.html later
    }
  }
</script>

</body>
</html>
