<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST Paul Learning Centre - Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Roboto', sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
  }

  .login-box {
    background:white;
    padding:2rem;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:100%;
    max-width:400px;
  }

  h2 {
    text-align:center;
    margin-bottom:1.5rem;
  }

  input, button {
    width:100%;
    padding:0.8rem;
    margin:0.5rem 0;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:1rem;
  }

  button {
    background:#1a73e8;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
  }

  button:hover {
    background:#0f5ed7;
  }

  .google-btn {
    background:#db4437;
  }

  .google-btn:hover {
    background:#c1351d;
  }
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="loginBtn">Login</button>
  <button id="googleBtn" class="google-btn">Login with Google</button>
</div>

<script type="module">

// 🔥 Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c",
  storageBucket: "my-school-project-6e00c.appspot.com",
  messagingSenderId: "14283853516",
  appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
  measurementId: "G-LTJZ2RDG15"
};

// 🔥 Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔒 ONLY THIS EMAIL IS ALLOWED
const allowedEmail = "nicholasbagenda@gmail.com";

// 🔁 If already logged in
onAuthStateChanged(auth, async (user) => {
  if (user) {
    if (user.email === allowedEmail) {
      window.location.href = "dashboard.html";
    } else {
      alert("Access Denied ❌ You are not Admin");
      await signOut(auth);
    }
  }
});

// ✅ Email Login
document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please enter email and password");
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);

    if (userCredential.user.email !== allowedEmail) {
      alert("Access Denied ❌ Not Authorized");
      await signOut(auth);
      return;
    }

    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }
});

// ✅ Google Login
document.getElementById("googleBtn").addEventListener("click", async () => {

  const provider = new GoogleAuthProvider();

  try {
    const result = await signInWithPopup(auth, provider);

    if (result.user.email !== allowedEmail) {
      alert("Access Denied ❌ Not Authorized");
      await signOut(auth);
      return;
    }

    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }
});

</script>

</body>
</html>
