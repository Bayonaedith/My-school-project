<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST Paul Learning Centre | Admin Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* Background Glow */
body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #3b82f6;
  filter: blur(150px);
  opacity: 0.4;
  top: 10%;
  left: 20%;
}

/* Card */
.login-card {
  position: relative;
  width: 100%;
  max-width: 420px;
  padding: 2.5rem;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 20px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.08);
  z-index: 2;
}

.login-card h1 {
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.login-card p {
  color: #94a3b8;
  margin-bottom: 2rem;
}

/* Inputs */
.input-group {
  margin-bottom: 1.2rem;
}

.input-group input {
  width: 100%;
  padding: 0.9rem 1rem;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 0.95rem;
}

.input-group input::placeholder {
  color: #94a3b8;
}

/* Buttons */
.btn {
  width: 100%;
  padding: 0.9rem;
  border-radius: 10px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s ease;
  font-size: 0.95rem;
}

.primary-btn {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  margin-bottom: 1rem;
}

.primary-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(59,130,246,0.4);
}

.google-btn {
  background: white;
  color: #1e293b;
}

.google-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255,255,255,0.2);
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 0.8rem;
  color: #64748b;
}
</style>
</head>

<body>

<div class="login-card">
  <h1>Admin Portal</h1>
  <p>Secure access to ST Paul Learning Centre system</p>

  <div class="input-group">
    <input type="email" id="email" placeholder="Admin Email">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Password">
  </div>

  <button id="loginBtn" class="btn primary-btn">Sign In</button>
  <button id="googleBtn" class="btn google-btn">Continue with Google</button>

  <div class="footer">
    Authorized personnel only
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c",
  storageBucket: "my-school-project-6e00c.appspot.com",
  messagingSenderId: "14283853516",
  appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
  measurementId: "G-LTJZ2RDG15"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const allowedEmail = "nicholasbagenda@gmail.com";

onAuthStateChanged(auth, async (user) => {
  if (user) {
    if (user.email === allowedEmail) {
      window.location.href = "dashboard.html";
    } else {
      alert("Access Denied ❌");
      await signOut(auth);
    }
  }
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);

    if (userCredential.user.email !== allowedEmail) {
      alert("Access Denied ❌");
      await signOut(auth);
      return;
    }

    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }
});

document.getElementById("googleBtn").addEventListener("click", async () => {
  const provider = new GoogleAuthProvider();

  try {
    const result = await signInWithPopup(auth, provider);

    if (result.user.email !== allowedEmail) {
      alert("Access Denied ❌");
      await signOut(auth);
      return;
    }

    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }
});

</script>

</body>
</html>
