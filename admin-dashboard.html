<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST Paul Learning Centre Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Roboto', sans-serif;
    margin:0;
    padding:0;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }

  .login-box {
    background:white;
    padding:2rem;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    width:100%;
    max-width:400px;
  }

  h2 { text-align:center; }

  input, button {
    width:100%;
    padding:0.7rem;
    margin:0.5rem 0;
    border-radius:5px;
    border:1px solid #ccc;
  }

  button {
    background:#1a73e8;
    color:white;
    border:none;
    cursor:pointer;
  }

  button:hover {
    background:#0f5ed7;
  }
</style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">

  <button id="loginBtn">Login</button>
  <button id="googleBtn">Login with Google</button>
</div>

<script type="module">

// 🔥 Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  signInWithPopup, 
  GoogleAuthProvider,
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";


// 🔥 Your Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCIu9Gi-TGqdjCsCxsyxyq1qV23pxVHOaI",
  authDomain: "my-school-project-6e00c.firebaseapp.com",
  projectId: "my-school-project-6e00c",
  storageBucket: "my-school-project-6e00c.appspot.com",
  messagingSenderId: "14283853516",
  appId: "1:14283853516:web:c7999ae32d83166cb8bc69",
  measurementId: "G-LTJZ2RDG15"
};

// 🔥 Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 If already logged in → go to dashboard
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "dashboard.html";
  }
});


// ✅ EMAIL LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);

    // Redirect after login
    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }
});


// ✅ GOOGLE LOGIN
document.getElementById("googleBtn").addEventListener("click", async () => {

  const provider = new GoogleAuthProvider();

  try {
    await signInWithPopup(auth, provider);

    // Redirect after login
    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }
});

</script>

</body>
</html>
